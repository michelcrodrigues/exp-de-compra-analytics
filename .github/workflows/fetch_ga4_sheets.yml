name: Coleta GA4 → history.ndjson → data.json

on:
  schedule:
    # 08:00 BRT (UTC-3) = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      force_historical:
        description: "Forçar modo histórico (recoleta dias faltando desde jan/2025)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_reprocess:
        description: "Reprocessar tudo do zero — APAGA o history.ndjson e recoleta desde jan/2025"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fetch-and-export:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt-in Node.js 24 (obrigatório a partir de 16/jun/2026)
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-api-python-client

      - name: Passo 1 — Coletar GA4 → data/history.ndjson
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          FORCE_HISTORICAL:     ${{ github.event.inputs.force_historical || 'false' }}
          FORCE_REPROCESS:      ${{ github.event.inputs.force_reprocess || 'false' }}
        run: python scripts/fetch_ga4.py

      - name: Passo 2 — Exportar history.ndjson → data.json
        run: python scripts/export_data.py

      - name: Passo 3 — Validar schema do data.json
        run: python scripts/validate_schema.py

      - name: Passo 4 — Commitar arquivos no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/history.ndjson data.json
          git diff --cached --quiet || git commit -m "chore: atualiza dados [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
