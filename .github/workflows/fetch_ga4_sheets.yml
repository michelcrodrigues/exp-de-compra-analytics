name: Coleta GA4 → Google Sheets → data.json

on:
  schedule:
    # 08:00 BRT (UTC-3) = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      force_historical:
        description: "Forçar modo histórico (recoleta tudo desde jan/2025)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fetch-and-export:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt-in Node.js 24 (obrigatório a partir de 16/jun/2026)
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-api-python-client

      - name: Passo 1 — Coletar GA4 → Google Sheets
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          FORCE_HISTORICAL:     ${{ github.event.inputs.force_historical || 'false' }}
        run: python scripts/fetch_ga4.py

      - name: Passo 2 — Exportar Sheets → data.json
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/export_data.py

      - name: Passo 3 — Commitar data.json no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Salva o data.json gerado, sincroniza com origin e restaura.
          # Necessário porque o export_data.py gera o arquivo antes do pull,
          # o que causa erro "unstaged changes" no git pull --rebase.
          git stash push --include-untracked -- data.json
          git pull --rebase origin main
          git stash pop
          git add data.json
          git diff --cached --quiet || git commit -m "chore: atualiza data.json [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
