name: Coleta GA4 → Google Sheets

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      force_historical:
        description: "Forçar modo histórico (recoleta tudo desde jan/2025)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-api-python-client

      - name: Executar coleta
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          FORCE_HISTORICAL:     ${{ github.event.inputs.force_historical || 'false' }}
        run: python scripts/fetch_ga4.py
