name: Coleta GA4 → SharePoint

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    # Timeout generoso para o modo histórico (147 dias × ~0.3s × 4 requests = ~3min)
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-api-python-client \
            requests \
            openpyxl

      - name: Executar coleta
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_SITE_ID:   ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_FILE_ID:   ${{ secrets.SHAREPOINT_FILE_ID }}
        run: python scripts/fetch_ga4.py
